<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <header>
            <h1>Parquímetro</h1>
        </header>
        <table>
            <thead>
                <tr>
                    <th>Valor</th>
                    <th>Tempo</th>
                </tr>
            </thead>
             <tbody>
                <tr>
                    <td>R$ 1,00</td>
                    <td>30 minutos</td>
                </tr> 
                <tr>
                    <td>R$ 1,75</td>
                    <td>60 minutos</td>
                </tr>
                <tr>
                    <td>R$ 3,00</td>
                    <td>120 minutos (tempo máximo permitido)</td>
                </tr>
            </tbody>
        </table>
        <input type="number" id="valor" placeholder="Insira um valor">
        <button onclick="calcular()">Calcular</button>
        <div id="resultado"></div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
